name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        working-directory: ./game
        run: npm ci

      # 게이트 1 — ESLint (--max-warnings 0: error/warning 모두 실패 처리)
      - name: Lint
        working-directory: ./game
        run: npm run lint

      # 게이트 2 — 타입체크 + 번들 빌드 (tsc -b && vite build)
      - name: Typecheck & Build
        working-directory: ./game
        run: npm run build

      # 배포 아티팩트는 main push에서만 업로드 (PR 검증 시엔 스킵)
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push'
        with:
          path: ./game/dist

  # 게이트 3 — 콘텐츠 회귀 검증 (부모 아크·reach·기억·생일 CG 필수세트 등 30종)
  # build와 독립 병렬로 돌되, deploy가 둘 다에 의존한다 (2026-07-13 게이트 승격).
  # 이전엔 PR 체크 전용이었으나 main 직접 push 시 검증 없이 배포되는 구멍이 있어 배포 게이트로 전환.
  content-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        working-directory: ./game
        run: npm ci

      - name: Content Verify
        working-directory: ./game
        run: npm run verify:ci

  deploy:
    # 배포는 main push에서만 — PR은 위 build 게이트까지만 돈다
    if: github.event_name == 'push'
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, content-verify]
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
